[package]
name = "carbon-prometheus-metrics"
version = "0.12.0"
description = "Prometheus Metrics"
license = { workspace = true }
edition = { workspace = true }
readme = "README.md"
repository = { workspace = true }
keywords = ["solana", "prometheus", "metrics"]
categories = ["encoding"]

[lib]
crate-type = ["rlib"]

[features]
default = ["http-server"]

http-server = ["dep:axum", "dep:tokio", "dep:tower", "dep:tower-http"]

[dependencies]
axum = { workspace = true, optional = true }
carbon-core = { workspace = true }
log = { workspace = true }
tokio = { workspace = true, optional = true, features = ["rt", "net", "signal"] }
tower = { version = "0.5", optional = true }
tower-http = { version = "0.6", optional = true, features = ["cors", "timeout"] }
