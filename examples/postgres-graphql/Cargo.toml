[package]
name = "postgres-graphql-carbon-example"
version = "0.12.0"
edition = { workspace = true }

[dependencies]
carbon-core = { workspace = true, features = ["graphql", "postgres"] }
carbon-log-metrics = { workspace = true }
carbon-token-program-decoder = { workspace = true, features = ["serde"] }
carbon-yellowstone-grpc-datasource = { workspace = true }

axum = { workspace = true }
bs58 = { workspace = true }
dotenv = { workspace = true }
env_logger = { workspace = true }
juniper = { workspace = true }
log = { workspace = true }
sqlx = { workspace = true, features = ["postgres", "runtime-tokio", "tls-native-tls"] }
tokio = { workspace = true, features = ["full"] }
yellowstone-grpc-proto = { workspace = true }

[dependencies.rustls]
default-features = false
features = ["std", "aws_lc_rs"]
version = "0.23.35"
