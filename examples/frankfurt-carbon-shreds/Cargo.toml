[package]
name = "frankfurt-carbon-shreds"
version = "0.1.0"
edition = { workspace = true }

# Carbon-decoded shred-side observation pipeline. Subscribes to the local
# Jito shredstream-proxy (via carbon-jito-shredstream-grpc-datasource),
# decodes target-wallet trades against the full Carbon decoder set, and
# emits ObservedTrigger events for every match. Observation only — never
# calls executor, never holds keypairs, never submits transactions. Runs
# as its own systemd unit with no shared state with frankfurt-rust.
#
# Once the gap vs frankfurt-rust's hand-rolled decoder.rs is quantified
# from observation logs, a follow-up work bridges these triggers into
# frankfurt-rust's executor (or replaces grpc.rs entirely). Until then
# this binary writes only to logs + a dedicated Redis observation
# channel that no live engine consumes.

[[bin]]
name = "frankfurt-carbon-shreds"
path = "src/main.rs"

[dependencies]
# Framework + datasource
carbon-core = { workspace = true }
carbon-jito-shredstream-grpc-datasource = { workspace = true }

# Decoders — same set frankfurt-carbon-surveillance pulls. Keeping them in
# sync ensures a single decoder-coverage profile across both pipelines.
carbon-address-lookup-table-decoder = { workspace = true }
carbon-associated-token-account-decoder = { workspace = true }
carbon-bonkswap-decoder = { workspace = true }
carbon-boop-decoder = { workspace = true }
carbon-dflow-aggregator-v4-decoder = { workspace = true }
carbon-fluxbeam-decoder = { workspace = true }
carbon-gavel-decoder = { workspace = true }
carbon-heaven-decoder = { workspace = true }
carbon-jupiter-swap-decoder = { workspace = true }
carbon-lifinity-amm-v2-decoder = { workspace = true }
carbon-meteora-damm-v2-decoder = { workspace = true }
carbon-meteora-dbc-decoder = { workspace = true }
carbon-meteora-dlmm-decoder = { workspace = true }
carbon-meteora-pools-decoder = { workspace = true }
carbon-meteora-vault-decoder = { workspace = true }
carbon-moonshot-decoder = { workspace = true }
carbon-okx-dex-decoder = { workspace = true }
carbon-onchain-labs-dex-v1-decoder = { workspace = true }
carbon-onchain-labs-dex-v2-decoder = { workspace = true }
carbon-openbook-v2-decoder = { workspace = true }
carbon-orca-whirlpool-decoder = { workspace = true }
carbon-pancake-swap-decoder = { workspace = true }
carbon-phoenix-v1-decoder = { workspace = true }
carbon-pump-swap-decoder = { workspace = true }
carbon-pumpfun-decoder = { workspace = true }
carbon-raydium-amm-v4-decoder = { workspace = true }
carbon-raydium-clmm-decoder = { workspace = true }
carbon-raydium-cpmm-decoder = { workspace = true }
carbon-raydium-launchpad-decoder = { workspace = true }
carbon-raydium-stable-swap-decoder = { workspace = true }

# Async runtime + utilities
async-trait = { workspace = true }
dashmap = "6"
once_cell = "1"
tokio = { version = "1", features = ["full"] }

# HTTP
axum = { workspace = true }
redis = { version = "0.29", features = ["tokio-comp"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }

# Serde + logging
log = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
