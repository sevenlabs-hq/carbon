# Runtime + HTTP
async-trait = { workspace = true }
axum = { workspace = true }
log = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["full"] }

# Not in Carbon's workspace deps — pulled directly
once_cell = "1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
