[package]
name = "graphql-api-carbon-example"
version = "0.12.0"
edition = { workspace = true }

[dependencies]
carbon-core = { workspace = true, features = ["graphql"] }
carbon-log-metrics = { workspace = true }
carbon-token-2022-decoder = { workspace = true, features = ["serde"] }
carbon-yellowstone-grpc-datasource = { workspace = true }
solana-pubkey = { workspace = true }

axum = { workspace = true }
dotenv = { workspace = true }
env_logger = { workspace = true }
juniper = { workspace = true }
log = { workspace = true }
tokio = { workspace = true, features = ["full"] }
yellowstone-grpc-proto = { workspace = true }

[dependencies.rustls]
default-features = false
features = ["std", "aws_lc_rs"]
version = "0.23.35"
